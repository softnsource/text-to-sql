# Universal Database Chatbot - Configuration

gemini:
  api_key: ${GEMINI_API_KEY_1}  # primary key; KeyManager loads all 13 from env
  model: "gemini-2.5-flash-lite"
  embedding_model: "gemini-embedding-001"
  max_tokens: 8192
  temperature: 0.1

qdrant:
  url: ${QDRANT_URL}
  collection_prefix: "session_"
  timeout: 300         # HTTP timeout in seconds for all Qdrant requests
  verify_ssl: true       # Set false if your Qdrant server uses a self-signed cert
  api_key: ${QDRANT_API_KEY}

query:
  max_rows_per_query: 1000
  query_timeout_seconds: 300
  max_retries: 3
  confidence_threshold: 0.6
  top_k_tables: 7
  max_merged_rows: 1000

uploads:
  dir: uploads
  max_size_mb: 100
  allowed_extensions:
    - .db
    - .sqlite
    - .sqlite3

session:
  ttl_hours: 4
  max_concurrent: 50
  cleanup_interval_minutes: 30
